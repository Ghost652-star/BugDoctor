llm:
  provider: openai-compat
  model: deepseek-v4-pro
  api_key: ""  # 或环境变量 BUGDOCTOR_API_KEY
  base_url: https://api.deepseek.com
  max_output_tokens: 4096

# 可选：记忆检索专用 LLM（不配则与 llm 相同）
# 阿里云 MaaS GLM 请用 OpenAI 兼容地址（带 /compatible-mode/v1）
recall_llm:
  provider: openai-compat
  model: glm-5.2
  api_key: ""  # 或环境变量 BUGDOCTOR_RECALL_API_KEY
  base_url: https://YOUR-INSTANCE.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  max_output_tokens: 512

max_agent_iterations: 30
